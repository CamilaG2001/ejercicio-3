<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nftis — Start Your Own Collection</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ Barra superior ============ -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-title">
        <span class="arrow">&#9664;</span>
        Nftis - NFT Creator Multipurpose WordPress Elementor Theme
      </div>
      <button class="btn-outline" type="button">Get Unlimited Downloads</button>
    </div>
  </div>

  <!-- ============ Header / menú ============ -->
  <header class="header">
    <div class="header-inner">

      <a class="logo" href="index.html">
        <span class="logo-badge">&#128053;</span>
        <span class="logo-text">
          <span class="name"><b>n</b>fti&rsquo;s</span>
          <span class="sub">CREATE &amp; SELL</span>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" id="mainNav">
        <a href="#" class="active">Home</a>
        <a href="#">Pages <span class="caret">&#9662;</span></a>
        <a href="#">NFT Marketplace</a>
        <a href="#">Activity</a>
        <a href="#">Blog</a>
      </nav>

      <div class="header-right">
        <div class="search">
          <input type="text" placeholder="Search &hellip;" aria-label="Buscar" />
        </div>
        <div class="socials">
          <a href="#" aria-label="Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 9V7.5c0-.7.3-1 1-1H16V4h-2.2C11.4 4 10 5.4 10 7.6V9H8v2.5h2V20h3v-8.5h2.1L15.5 9z"/></svg>
          </a>
          <a href="#" aria-label="Instagram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
        </div>
      </div>

    </div>
  </header>

  <!-- ============ Hero ============ -->
  <section class="hero">
    <div class="hero-inner">

      <div class="hero-left">
        <h1>Start Your Own Collection</h1>
        <p>It is a long established fact that a reader will be distracted by the readable content of a page when looking at its layout.</p>
        <a href="#" class="cta">Get Easy Access</a>
      </div>

      <div class="hero-right">
        <div class="arch"></div>
        <div class="character">
          <img src="assets/img/personaje.png" alt="Gato NFT con hoodie rosa" />
        </div>
      </div>

    </div>
  </section>

  <!-- ============ Chat flotante ============ -->
  <button class="chat" type="button" aria-label="Abrir chat">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H8l-4 4V5a1 1 0 0 1 1-1z"/></svg>
  </button>

  <script src="js/script.js"></script>
</body>
</html>
